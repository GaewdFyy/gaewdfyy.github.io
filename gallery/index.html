  <style>
    /* ── Design tokens ──────────────────────────────────────── */
    :root {
      --primary:           #ffb68a;
      --on-primary:        #4a1f00;
      --primary-container: #6b3000;
      --secondary:         #e8c4a8;
      --surface:           #1a1310;
      --surface-variant:   #2b1f18;
      --on-surface:        #f0e8e0;
      --background:        #130f0c;
      --outline:           #5c4030;
      --outline-variant:   #3e2a1e;
      --t: 0.6s;
      --drawer-w: 260px;
      --header-h: 58px; /* 固定的顶栏高度 */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--background);
      color: var(--on-surface);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      display: flex; flex-direction: column;
      padding-top: var(--header-h); /* 为固定顶栏留出空间 */
      transition: background var(--t) ease, color var(--t) ease;
      overflow: hidden;         /* shell handles scroll on desktop */
    }

    /* ── Header (全平台强力置顶) ──────────────────────────────────── */
    .top-bar {
      display: flex;
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      z-index: 300;
      align-items: center; gap: 1rem;
      padding: 0 1.25rem;
      background: var(--surface-variant);
      border-bottom: 1px solid var(--outline-variant);
      transition: background var(--t) ease, border-color var(--t) ease;
    }
    .top-bar h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 1.45rem;
      color: var(--primary); flex: 1;
    }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: none; background: transparent;
      color: var(--on-surface); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color var(--t) ease; flex-shrink: 0;
    }
    .icon-btn:hover { background: color-mix(in srgb, var(--on-surface) 8%, transparent); }
    .icon-btn svg { width: 22px; height: 22px; stroke-linecap: round; stroke-linejoin: round; }

    /* 隐藏桌面端的侧边栏呼出按钮 */
    @media (min-width: 861px) {
      #drawerToggle { display: none; }
    }

    /* ── Shell (drawer + main side by side) ─────────────────── */
    .shell { flex: 1; display: flex; min-height: 0; position: relative; }

    /* ── MD3 Navigation Drawer ──────────────────────────────── */
    .drawer {
      width: var(--drawer-w); flex-shrink: 0;
      display: flex; flex-direction: column;
      background: var(--surface-variant);
      border-right: 1px solid var(--outline-variant);
      overflow-y: auto; overflow-x: hidden;
      transition: background var(--t) ease, border-color var(--t) ease;
    }
    .drawer::-webkit-scrollbar { display: none; }

    .drawer-header { padding: 2rem 1.5rem 0.85rem; flex-shrink: 0; }
    .drawer-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400; font-size: 1.35rem; line-height: 1.2;
      color: var(--on-surface); opacity: 0.9;
      letter-spacing: 0.02em;
    }

    .drawer-divider { height: 1px; background: var(--outline-variant); margin: 0.6rem 1.25rem; transition: background var(--t) ease;}

    .drawer-section-label {
      font-size: 0.58rem; letter-spacing: 0.2em;
      text-transform: uppercase; opacity: 0.45;
      padding: 0.9rem 1.5rem 0.35rem;
    }

    /* nav item (pill) */
    .nav-item {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.7rem 1rem 0.7rem 1.1rem;
      margin: 0.08rem 0.65rem;
      border-radius: 99px; cursor: pointer;
      transition: background 0.18s, color 0.18s;
      user-select: none; position: relative;
    }
    .nav-item:hover { background: color-mix(in srgb, var(--on-surface) 8%, transparent); }
    .nav-item.active { background: var(--primary-container); color: var(--on-primary-container); }

    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.65; transition: opacity 0.18s; }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-label { font-size: 0.84rem; flex: 1; }
    .nav-count {
      font-size: 0.65rem; opacity: 0.6;
      background: color-mix(in srgb, var(--on-surface) 8%, transparent);
      padding: 0.08rem 0.48rem; border-radius: 99px;
    }
    .nav-item.active .nav-count { opacity: 0.8; background: color-mix(in srgb, var(--on-primary-container) 12%, transparent); }

    /* sub-list */
    .nav-sub { overflow: hidden; max-height: 0; transition: max-height 0.28s ease; }
    .nav-sub.open { max-height: 600px; }

    .nav-sub-item {
      display: flex; align-items: center; gap: 0.55rem;
      padding: 0.38rem 1rem 0.38rem 3rem;
      margin: 0 0.65rem; border-radius: 99px;
      font-size: 0.72rem; opacity: 0.55;
      cursor: pointer; transition: opacity 0.15s, background 0.15s;
    }
    .nav-sub-item:hover { opacity: 0.9; background: color-mix(in srgb, var(--on-surface) 6%, transparent); }
    .nav-sub-item.tl-active { opacity: 1; color: var(--primary); }
    .nav-sub-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor; flex-shrink: 0; transition: transform 0.15s;
    }
    .nav-sub-item.tl-active .nav-sub-dot { transform: scale(1.7); }

    /* ── Drawer Footer (版权署名) ───────────────────────────── */
    .drawer-footer {
      margin-top: auto; /* 确保顶到最下方 */
      padding: 2rem 1.5rem 1.5rem;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      opacity: 0.35;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Scrim (mobile) ─────────────────────────────────────── */
    .scrim {
      display: none; position: fixed; inset: 0; z-index: 298;
      background: rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none; transition: opacity 0.28s ease;
    }

    /* ── Main scroll area ───────────────────────────────────── */
    .main { flex: 1; overflow-y: auto; overflow-x: hidden; min-width: 0; }

    /* ── Gallery ────────────────────────────────────────────── */
    .gallery-wrap { padding: 2.5rem 2.5rem 5rem; }
    .month-group { margin-bottom: 0.5rem; }
    .month-group.empty { display: none; }
    .month-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 600; font-style: italic;
      color: var(--secondary); opacity: 0.7;
      margin-bottom: 0.9rem; padding-left: 2px;
    }

    /* ── Masonry grid ───────────────────────────────────────── */
    .grid { position: relative; }
    .grid-sizer, .gallery-item { width: calc(25% - 12px); }
    .gutter-sizer { width: 16px; }

    .gallery-item {
      margin-bottom: 16px; cursor: pointer;
      position: relative; overflow: hidden; border-radius: 10px;
      opacity: 0; animation: rise 0.5s ease forwards;
    }
    @keyframes rise { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
    .gallery-item img { width: 100%; display: block; border-radius: 10px; transition: transform 0.5s ease; }
    .gallery-item:hover img { transform: scale(1.05); }

    .item-hover-caption {
      position: absolute; inset: 0; border-radius: 10px;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 1rem 0.9rem 0.85rem;
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.14) 55%, transparent 100%);
      opacity: 0; transition: opacity 0.28s ease; pointer-events: none;
    }
    .gallery-item:hover .item-hover-caption { opacity: 1; }
    .caption-en {
      font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
      font-size: 1rem; color: #fff; line-height: 1.2;
      text-shadow: 0 1px 5px rgba(0,0,0,0.55);
    }
    .caption-zh {
      font-size: 0.62rem; letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.8); margin-top: 0.2rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* ── Empty state ────────────────────────────────────────── */
    .empty-state {
      display: none; flex-direction: column;
      align-items: center; padding: 6rem 2rem;
      opacity: 0.4; gap: 0.8rem;
    }
    .empty-state.show { display: flex; }
    .empty-state svg { width: 44px; }
    .empty-state p { font-size: 0.82rem; letter-spacing: 0.1em; }

    /* ── Detail overlay ─────────────────────────────────────── */
    .detail-overlay {
      position: fixed; inset: 0; z-index: 400;
      display: flex; align-items: stretch;
      opacity: 0; pointer-events: none; transition: opacity 0.32s ease;
    }
    .detail-overlay.open { opacity: 1; pointer-events: all; }
    .detail-backdrop { 
      position: absolute; inset: 0; 
      background: color-mix(in srgb, var(--background) 85%, transparent); 
      backdrop-filter: blur(10px); 
      transition: background var(--t) ease;
    }

    .detail-panel {
      position: relative; z-index: 1; display: flex;
      width: 100%; max-width: 1200px; margin: auto;
      height: 88vh; border-radius: 16px; overflow: hidden;
      background: var(--surface); border: 1px solid var(--outline-variant);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      transform: translateY(20px) scale(0.975);
      transition: transform 0.36s cubic-bezier(0.22,1,0.36,1), background var(--t) ease, border-color var(--t) ease;
    }
    .detail-overlay.open .detail-panel { transform: none; }

    .detail-img-wrap { flex: 1 1 60%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .detail-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .detail-meta {
      flex: 0 0 320px; display: flex; flex-direction: column;
      padding: 2.5rem 1.8rem; border-left: 1px solid var(--outline-variant);
      overflow-y: auto; background: var(--surface-variant);
      transition: background var(--t) ease, border-color var(--t) ease;
    }
    .detail-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 600; font-size: 1.85rem; margin-bottom: 0.35rem; color: var(--on-surface); }
    .detail-loc   { font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--secondary); margin-bottom: 0.5rem; }
    .detail-date  { font-size: 0.65rem; opacity: 0.45; margin-bottom: 1.5rem; }
    .detail-tag-row { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 1.6rem; }
    .detail-tag-chip { font-size: 0.6rem; letter-spacing: 0.07em; padding: 0.18rem 0.6rem; border-radius: 99px; border: 1px solid var(--outline); color: var(--primary); background: var(--primary-container); }
    .detail-params { display: grid; grid-template-columns: auto 1fr; gap: 0.55rem 1.1rem; margin-bottom: 1.8rem; }
    .param-key { font-size: 0.62rem; text-transform: uppercase; opacity: 0.5; }
    .param-val  { font-size: 0.8rem; }
    .detail-comment { font-size: 0.83rem; line-height: 1.78; opacity: 0.8; border-left: 2px solid var(--primary); padding-left: 0.85rem; margin-bottom: 2.5rem; }
    .btn-raw {
      margin-top: auto; display: flex; align-items: center; justify-content: center;
      padding: 0.75rem; border-radius: 8px;
      background: var(--primary-container); color: var(--on-primary-container);
      text-decoration: none; font-size: 0.72rem; letter-spacing: 0.1em;
      text-transform: uppercase; border: 1px solid var(--outline); transition: all 0.2s ease;
    }
    .btn-raw:hover { background: var(--primary); color: var(--on-primary); transform: translateY(-2px); }
    .detail-close {
      position: absolute; top: 0.9rem; right: 0.9rem; z-index: 10;
      width: 34px; height: 34px; border-radius: 50%;
      background: color-mix(in srgb, var(--on-surface) 10%, transparent); border: none;
      color: var(--on-surface); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
      transition: background 0.2s, color var(--t) ease;
    }
    .detail-close:hover { background: color-mix(in srgb, var(--on-surface) 20%, transparent); }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 1200px) {
      .grid-sizer, .gallery-item { width: calc(33.333% - 11px); }
    }
    @media (max-width: 860px) {
      body { overflow: auto; height: auto; } /* 允许移动端原生滚动，fixed header 依然生效 */
      .shell { overflow: visible; }
      .main  { overflow: visible; }

      /* drawer 弹出层定位基于固定的顶栏高度 */
      .drawer {
        position: fixed; top: var(--header-h); left: 0; bottom: 0; z-index: 299;
        transform: translateX(calc(-1 * var(--drawer-w) - 8px));
        transition: transform 0.3s cubic-bezier(0.2,0,0,1), background var(--t) ease;
        box-shadow: none; border-right: none;
      }
      .drawer.open {
        transform: translateX(0);
        box-shadow: 8px 0 32px rgba(0,0,0,0.55);
      }
      .scrim { display: block; }
      .scrim.show { opacity: 1; pointer-events: all; }

      .gallery-wrap { padding: 1.8rem 1.25rem 4rem; }
      
      .detail-overlay { align-items: flex-end; }
      .detail-panel {
        flex-direction: column; width: 100%; max-width: 100%; height: 92dvh;
        border-radius: 20px 20px 0 0; margin: 0; transform: translateY(40px);
      }
      .detail-overlay.open .detail-panel { transform: translateY(0); }
      .detail-img-wrap { flex: 0 0 42%; min-height: 0; }
      .detail-meta {
        flex: 1 1 0; min-height: 0; border-left: none;
        border-top: 1px solid var(--outline-variant);
        padding: 1.4rem 1.5rem 2rem; overflow-y: auto;
      }
      .detail-title { font-size: 1.45rem; margin-bottom: 0.5rem; }
      .detail-loc  { margin-bottom: 0.45rem; }
      .detail-date { margin-bottom: 1rem; }
      .detail-tag-row { margin-bottom: 1.1rem; }
      .detail-params  { margin-bottom: 1.2rem; }
      .detail-comment { margin-bottom: 1.6rem; }
      .detail-close { top: 0.75rem; right: 0.75rem; background: rgba(0,0,0,0.45); backdrop-filter: blur(8px); color: #fff; }
    }
    @media (max-width: 640px) {
      .grid-sizer, .gallery-item { width: calc(50% - 8px); }
    }
    @media (max-width: 420px) {
      .grid-sizer, .gallery-item { width: 100%; margin-bottom: 10px; }
    }
  </style>
</head>

  },
];

/* ── Theme Management ─────────────────────────────────────── */
const root = document.documentElement;
const colorCache = new Map();

const prefersDarkQuery = window.matchMedia('(prefers-color-scheme: dark)');
let isDarkMode = localStorage.getItem('md3-theme') 
  ? localStorage.getItem('md3-theme') === 'dark' 
  : prefersDarkQuery.matches;
let currentBaseColor = [249, 202, 163];

const themeToggleBtn = document.getElementById('themeToggle');

function updateThemeIcon() {
  themeToggleBtn.innerHTML = isDarkMode
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
}

function applyTheme(r, g, b, dark = isDarkMode) {
  currentBaseColor = [r, g, b];
  const s = themeFromSourceColor(argbFromRgb(r, g, b)).schemes[dark ? 'dark' : 'light'];
  const vars = {
    '--primary':              hexFromArgb(s.primary),
    '--on-primary':           hexFromArgb(s.onPrimary),
    '--primary-container':    hexFromArgb(s.primaryContainer),
    '--on-primary-container': hexFromArgb(s.onPrimaryContainer),
    '--secondary':            hexFromArgb(s.secondary),
    '--surface':              hexFromArgb(s.surface),
    '--surface-variant':      hexFromArgb(s.surfaceVariant),
    '--on-surface':           hexFromArgb(s.onSurface),
    '--outline':              hexFromArgb(s.outline),
    '--outline-variant':      hexFromArgb(s.outlineVariant),
    '--background':           hexFromArgb(s.background),
  };
  for (const [k, v] of Object.entries(vars)) root.style.setProperty(k, v);
}

themeToggleBtn.addEventListener('click', () => {
  isDarkMode = !isDarkMode;
  localStorage.setItem('md3-theme', isDarkMode ? 'dark' : 'light');
  updateThemeIcon();
  applyTheme(...currentBaseColor);
});

prefersDarkQuery.addEventListener('change', (e) => {
  if (!localStorage.getItem('md3-theme')) {
    isDarkMode = e.matches;
    updateThemeIcon();
    applyTheme(...currentBaseColor);
  }
});

updateThemeIcon();
applyTheme(...currentBaseColor);

/* ── Date / group helpers ─────────────────────────────────── */
const MONTHS_ZH = ['一月','二月','三月','四月','五月','六月',
                   '七月','八月','九月','十月','十一月','十二月'];

const parseDate  = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const groupKey   = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const groupLabel = k => { const [y,m] = k.split('-'); return `${y} · ${MONTHS_ZH[+m-1]}`; };
const anchor     = k => `grp-${k}`;

/* ── Derive data structures ───────────────────────────────── */
PHOTOS.sort((a, b) => parseDate(b.date) - parseDate(a.date));

const allTags = [...new Set(PHOTOS.flatMap(p => p.tags))];
const groups = new Map();
PHOTOS.forEach(p => {
  const k = groupKey(parseDate(p.date));
  if (!groups.has(k)) groups.set(k, []);
  groups.get(k).push(p);
});

/* ── State ────────────────────────────────────────────────── */
let activeTag = '全部';

/* ── Nav Build ────────────────────────────────────────────── */
const ICON_ALL = `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
  <rect x="3" y="3" width="7" height="7" rx="1.5"/>
  <rect x="14" y="3" width="7" height="7" rx="1.5"/>
  <rect x="3" y="14" width="7" height="7" rx="1.5"/>
  <rect x="14" y="14" width="7" height="7" rx="1.5"/>
</svg>`;
const ICON_TAG = `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
  <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
  <line x1="7" y1="7" x2="7.01" y2="7"/>
</svg>`;

function buildNav() {
  const list = document.getElementById('navList');
  list.innerHTML = '';
  appendNavItem(list, '全部', ICON_ALL, PHOTOS.length);
  allTags.forEach(tag => {
    appendNavItem(list, tag, ICON_TAG, PHOTOS.filter(p => p.tags.includes(tag)).length);
  });
  syncNavActive();
}

function appendNavItem(list, tag, icon, count) {
  const item = document.createElement('div');
  item.className = 'nav-item';
  item.dataset.tag = tag;
  item.innerHTML = `${icon}<span class="nav-label">${tag}</span><span class="nav-count">${count}</span>`;
  item.addEventListener('click', () => { selectTag(tag); closeMobileDrawer(); });

  const sub = document.createElement('div');
  sub.className = 'nav-sub';
  sub.dataset.tag = tag;
  rebuildSubItems(sub, tag);

  list.appendChild(item);
  list.appendChild(sub);
}

function rebuildSubItems(container, tag) {
  container.innerHTML = '';
  groups.forEach((photos, key) => {
    if (tag !== '全部' && !photos.some(p => p.tags.includes(tag))) return;
    const [y, m] = key.split('-');
    const row = document.createElement('div');
    row.className = 'nav-sub-item';
    row.dataset.key = key;
    row.innerHTML = `<div class="nav-sub-dot"></div>${y} ${MONTHS_ZH[+m-1]}`;
    row.addEventListener('click', e => { e.stopPropagation(); scrollToGroup(key); closeMobileDrawer(); });
    container.appendChild(row);
  });
}

function syncNavActive() {
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.tag === activeTag));
  document.querySelectorAll('.nav-sub').forEach(el =>
    el.classList.toggle('open', el.dataset.tag === activeTag));
}

function selectTag(tag) {
  activeTag = tag;
  syncNavActive();
  renderGallery();
}

/* ── Gallery Render ───────────────────────────────────────── */
const galleryRoot = document.getElementById('galleryRoot');

function renderGallery() {
  galleryRoot.innerHTML = '';
  let anyVisible = false;

  groups.forEach((photos, key) => {
    const visible = activeTag === '全部'
      ? photos
      : photos.filter(p => p.tags.includes(activeTag));

    if (!visible.length) return;
    anyVisible = true;

    const section = document.createElement('div');
    section.className = 'month-group';
    section.id = anchor(key);

    const heading = document.createElement('div');
    heading.className = 'month-heading';
    heading.textContent = groupLabel(key);
    section.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'grid';
    grid.innerHTML = '<div class="grid-sizer"></div><div class="gutter-sizer"></div>';

    visible.forEach(p => {
      const item = document.createElement('div');
      item.className = 'gallery-item';

      const img = document.createElement('img');
      img.src = p.src; img.alt = p.title; img.crossOrigin = 'anonymous'; img.loading = 'lazy';

      const cap = document.createElement('div');
      cap.className = 'item-hover-caption';
      cap.innerHTML = `<span class="caption-en">${p.title}</span><span class="caption-zh">${p.loc}</span>`;

      item.appendChild(img);
      item.appendChild(cap);
      item.addEventListener('click', () => openDetail(p, img));
      grid.appendChild(item);
    });

    section.appendChild(grid);
    galleryRoot.appendChild(section);

    imagesLoaded(grid, () => {
      new Masonry(grid, {
        itemSelector: '.gallery-item',
        columnWidth:  '.grid-sizer',
        gutter:       '.gutter-sizer',
        percentPosition: true,
      });
      updateSubActive();
    });
  });

  document.getElementById('emptyState').classList.toggle('show', !anyVisible);
  updateSubActive();
}

/* ── Scroll Tracking ──────────────────────────────────────── */
function scrollToGroup(key) {
  const el = document.getElementById(anchor(key));
  if (!el) return;
  const main = document.getElementById('main');
  const isMobile = window.innerWidth <= 860;
  if (isMobile) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    main.scrollTo({ top: el.offsetTop - 20, behavior: 'smooth' });
  }
}

function updateSubActive() {
  const isMobile = window.innerWidth <= 860;
  const scrollTop = isMobile
    ? (document.documentElement.scrollTop || document.body.scrollTop)
    : document.getElementById('main').scrollTop;

  const threshold = scrollTop + 100;
  const sections  = [...document.querySelectorAll('.month-group')];
  if (!sections.length) return;

  let activeKey = sections[0].id.replace('grp-', '');
  sections.forEach(s => {
    if (s.offsetTop <= threshold) activeKey = s.id.replace('grp-', '');
  });

  document.querySelectorAll('.nav-sub-item').forEach(el =>
    el.classList.toggle('tl-active', el.dataset.key === activeKey));
}

document.getElementById('main').addEventListener('scroll', updateSubActive, { passive: true });
window.addEventListener('scroll', updateSubActive, { passive: true });

/* ── Mobile Drawer ────────────────────────────────────────── */
const drawer = document.getElementById('drawer');
const scrim  = document.getElementById('scrim');

function openMobileDrawer()  { drawer.classList.add('open');    scrim.classList.add('show'); }
function closeMobileDrawer() { drawer.classList.remove('open'); scrim.classList.remove('show'); }

document.getElementById('drawerToggle').addEventListener('click', openMobileDrawer);
scrim.addEventListener('click', closeMobileDrawer);

/* ── Detail Overlay ───────────────────────────────────────── */
const overlay   = document.getElementById('detailOverlay');
const detailImg = document.getElementById('detailImg');
const btnRaw    = document.getElementById('btnRaw');
let pendingLoad = null;

function openDetail(p, thumbImg) {
  document.getElementById('detailTitle').textContent   = p.title   || '无题';
  document.getElementById('detailLoc').textContent     = p.loc     || '';
  document.getElementById('detailDate').textContent    = p.date    || '';
  document.getElementById('detailComment').textContent = p.comment || '';
  document.getElementById('detailParams').innerHTML    = `
    <span class="param-key">相机</span><span class="param-val">${p.camera   || '-'}</span>
    <span class="param-key">参数</span><span class="param-val">${p.settings || '-'}</span>
  `;
  document.getElementById('detailTagRow').innerHTML =
    (p.tags || []).map(t => `<span class="detail-tag-chip">${t}</span>`).join('');
  btnRaw.href = p.raw || '#';
  detailImg.src = thumbImg.src;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  const key = thumbImg.src;
  pendingLoad = key;

  if (colorCache.has(key)) {
    applyTheme(...colorCache.get(key));
    return;
  }

  createImageBitmap(thumbImg, {
    resizeWidth: 80, resizeHeight: 80, resizeQuality: 'low',
  }).then(bitmap => {
    const oc  = new OffscreenCanvas(80, 80);
    const ctx = oc.getContext('2d');
    ctx.drawImage(bitmap, 0, 0);
    bitmap.close();

    const data = ctx.getImageData(0, 0, 80, 80).data;
    let r = 0, g = 0, b = 0, count = 0;
    for (let i = 0; i < data.length; i += 16) {
      const a = data[i + 3];
      if (a < 128) continue;
      r += data[i]; g += data[i+1]; b += data[i+2];
      count++;
    }
    if (!count) return;
    const color = [Math.round(r/count), Math.round(g/count), Math.round(b/count)];
    colorCache.set(key, color);
    if (pendingLoad === key) applyTheme(...color);
  }).catch(() => {});
}

const closeDetail = () => {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  pendingLoad = null;
};
document.getElementById('detailClose').onclick    = closeDetail;
document.getElementById('detailBackdrop').onclick = closeDetail;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

/* ── Init ─────────────────────────────────────────────────── */
buildNav();
renderGallery();
</script>
</body>
</html>
